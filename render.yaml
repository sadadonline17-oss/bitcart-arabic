# render.yaml - Render Blueprint
# https://render.com/docs/blueprint-spec

databases:
  - name: bitcart-postgres
    plan: free
    region: frankfurt
    databaseName: bitcart
    user: bitcart

services:
  # API Service
  - type: web
    name: bitcart-api
    env: docker
    region: frankfurt
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: BITCART_ENV
        value: production
      - key: BITCART_CRYPTOS
        value: btc,eth,ltc
      - key: DATABASE_URL
        fromDatabase:
          name: bitcart-postgres
          property: connectionString
      - key: REDIS_URL
        value: redis://bitcart-redis:6379

  # Redis
  - type: redis
    name: bitcart-redis
    plan: free
    region: frankfurt
    ipAllowList: []

  # Frontend (Static)
  - type: web
    name: bitcart-frontend
    env: static
    region: frankfurt
    plan: free
    staticPublishPath: ./api-docker
    buildCommand: ""
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /payment.html
