# render.yaml - Render Blueprint
# https://render.com/docs/blueprint-spec

databases:
  - name: bitcart-postgres
    plan: free
    region: frankfurt
    databaseName: bitcart
    user: bitcart

services:
  # API Service
  - type: web
    name: bitcart-api
    env: docker
    region: frankfurt
    plan: free
    dockerfilePath: ./api-docker/Dockerfile
    healthCheckPath: /health
    envVars:
      - key: BITCART_ENV
        value: production
      - key: BITCART_CRYPTOS
        value: btc,eth,ltc
      - key: DATABASE_URL
        fromDatabase:
          name: bitcart-postgres
          property: connectionString
      - key: REDIS_URL
        value: redis://bitcart-redis:6379

  # Redis
  - type: redis
    name: bitcart-redis
    plan: free
    region: frankfurt
    ipAllowList: []
